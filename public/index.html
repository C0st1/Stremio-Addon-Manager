<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Stremio Addon Manager</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SortableJS -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

<div class="max-w-3xl mx-auto">

    <h1 class="text-3xl font-bold mb-4">🎬 Stremio Addon Manager</h1>

    <!-- Instructions -->
    <div class="bg-gray-800 p-4 rounded mb-4 text-sm">
        <p class="mb-2 font-semibold">🔐 How to get your AuthKey:</p>
        <ol class="list-decimal list-inside space-y-1">
            <li>Go to https://web.stremio.com</li>
            <li>Press F12 (Developer Console)</li>
            <li>Run:</li>
        </ol>
        <pre class="bg-black p-2 mt-2 rounded text-green-400 text-xs">
JSON.parse(localStorage.getItem("profile")).auth.key
        </pre>
        <p class="mt-2">Paste the result below.</p>
    </div>

    <!-- Auth Input -->
    <input id="authKey" placeholder="Paste Stremio AuthKey..."
        class="w-full p-3 rounded bg-gray-800 border border-gray-700 mb-4" />

    <button onclick="loadAddons()"
        class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded mb-6">
        Load Addons
    </button>

    <!-- Addon List -->
    <ul id="addonList" class="space-y-2"></ul>

    <!-- Sync Button -->
    <button onclick="syncOrder()"
        class="mt-6 bg-green-600 hover:bg-green-700 px-4 py-2 rounded w-full">
        Sync Order to Stremio
    </button>

    <!-- Install Link -->
    <a id="installLink"
       class="block mt-4 text-center text-blue-400 underline">
       Install Manager to Stremio
    </a>

</div>

<!-- Toast -->
<div id="toast"
     class="fixed bottom-5 right-5 bg-green-600 px-4 py-2 rounded hidden">
</div>

<script>
const API_GET = "https://api.strem.io/api/addonCollectionGet";
const API_SET = "https://api.strem.io/api/addonCollectionSet";

let sortable;

// Build install link dynamically
document.getElementById("installLink").href =
    `stremio://${location.host}/manifest.json`;

// Toast helper
function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.remove("hidden");
    setTimeout(() => toast.classList.add("hidden"), 5000);
}

// Fetch addons
async function loadAddons() {
    const authKey = document.getElementById("authKey").value.trim();

    if (!authKey) {
        alert("AuthKey required");
        return;
    }

    try {
        const res = await fetch(API_GET, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                type: "Auth",
                authKey
            })
        });

        if (!res.ok) throw new Error("API error");

        const data = await res.json();

        renderAddons(data.addons || []);

    } catch (err) {
        console.error(err);
        alert("Failed to load addons");
    }
}

// Render list
function renderAddons(addons) {
    const list = document.getElementById("addonList");
    list.innerHTML = "";

    addons.forEach(addon => {
        const li = document.createElement("li");

        li.className =
            "flex items-center bg-gray-800 p-3 rounded cursor-move";

        li.dataset.url = addon.transportUrl;

        li.innerHTML = `
            <div class="drag-handle mr-3 cursor-grab">☰</div>
            <img src="${addon.manifest.logo || 'https://via.placeholder.com/40'}"
                 onerror="this.src='https://via.placeholder.com/40'"
                 class="w-10 h-10 mr-3 rounded" />
            <span>${addon.manifest.name}</span>
        `;

        list.appendChild(li);
    });

    // Enable drag
    sortable = new Sortable(list, {
        animation: 150,
        ghostClass: 'bg-gray-700',
        handle: '.drag-handle'
    });
}

// Sync order
async function syncOrder() {
    const authKey = document.getElementById("authKey").value.trim();
    const items = document.querySelectorAll("#addonList li");

    const newOrder = Array.from(items).map(el => ({
        transportUrl: el.dataset.url
    }));

    try {
        const res = await fetch(API_SET, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                type: "Auth",
                authKey,
                addons: newOrder
            })
        });

        if (!res.ok) throw new Error("Sync failed");

        showToast("✅ Success! Force close Stremio & clear cache.");

    } catch (err) {
        console.error(err);
        alert("Failed to sync order");
    }
}
</script>

</body>
</html>
